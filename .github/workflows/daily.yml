name: Daily Forex Rankings Post

on:
  schedule:
    # 00:00 UTC = 08:00 Singapore (SGT, UTC+8). Runs every day.
    # Note: GitHub may delay scheduled runs by a few minutes under load.
    - cron: "0 0 * * *"

  # Lets you trigger the workflow by hand from the Actions tab — good for testing.
  workflow_dispatch:
    inputs:
      top_n:
        description: "How many top copiers to post (overrides default)"
        required: false
        default: "5"
      dry_run:
        description: "Print the message without posting (true/false)"
        required: false
        default: "false"

env:
  # Opt into Node.js 24 for JavaScript actions, per
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  # Silences the Node 20 deprecation warning. Safe to remove after June 2, 2026
  # once Node 24 becomes the default runner.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post rankings
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SHEET_TAB: ${{ secrets.GOOGLE_SHEET_TAB }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TOP_N: ${{ github.event.inputs.top_n || '5' }}
          CHANNEL_TITLE: "Top Forex Copiers"
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python post_rankings.py --dry-run --top "$TOP_N"
          else
            python post_rankings.py --top "$TOP_N"
          fi
